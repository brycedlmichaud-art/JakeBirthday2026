<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gothic Birthday Ritual</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @font-face {
            font-family: 'OldLondon';
            src: url('OldLondon.ttf') format('truetype');
        }
        body { background-color: #000; overflow: hidden; margin: 0; -webkit-font-smoothing: antialiased; }
        .gothic-text { font-family: 'OldLondon', serif; }
        
        #friend-name {
            font-size: clamp(2rem, 10vw, 9rem);
            line-height: 1.1;
            width: 90%;
            margin: 0 auto;
            overflow-wrap: break-word;
        }

        #enter-btn {
            font-size: clamp(1.5rem, 5vw, 3rem);
        }

        #speech-text {
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.8), 0 0 20px rgba(168, 85, 247, 0.4);
        }

        .lightning-flash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
        }

        .letter { display: inline-block; opacity: 0; filter: blur(10px); }

        .anime-flame {
            position: absolute;
            border-radius: 50% 50% 0 0;
            transform-origin: bottom center;
            pointer-events: none;
            mix-blend-mode: screen;
        }
        
        .anime-spark {
            position: absolute;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 5px #fff, 0 0 10px #d8b4fe;
            pointer-events: none;
            z-index: 30;
        }

        .fire-word {
            font-family: 'OldLondon', serif;
            transform-origin: center center;
            display: inline-block;
        }
    </style>
</head>
<body class="bg-black text-white">

    <div class="lightning-flash" id="flash"></div>

    <div id="youtube-audio" class="absolute opacity-0 pointer-events-none">
        <iframe id="audio-player" 
                src="https://www.youtube.com/embed/7P7imLdIetg?enablejsapi=1&start=3" 
                allow="autoplay">
        </iframe>
    </div>

    <div id="youtube-sfx" class="absolute opacity-0 pointer-events-none">
        <iframe id="sfx-player" 
                src="https://www.youtube.com/embed/v3H_X_q6CDE?enablejsapi=1&autoplay=1&mute=0" 
                allow="autoplay">
        </iframe>
    </div>

    <div id="intro-screen" class="flex flex-col items-center justify-center h-screen w-full relative z-10 px-4 text-center">
        <h1 id="friend-name" class="gothic-text tracking-wider">Jacobus LeRoux</h1>
        <button id="enter-btn" class="gothic-text opacity-0 cursor-pointer hover:text-purple-400 transition-colors duration-500 tracking-[0.5em] mt-12">
            ENTER
        </button>
    </div>

    <div id="scene-2" class="fixed inset-0 hidden overflow-hidden bg-black">
        <img src="bryce1.webp" id="bryce-img" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[85%] md:w-auto md:h-[90%] opacity-0 filter">
        
        <div id="bryce-speech" class="absolute top-[15%] right-[5%] w-[40%] md:w-[30%] opacity-0 z-30 pointer-events-none text-left">
            <p id="speech-text" class="gothic-text text-xl md:text-3xl text-purple-100 leading-relaxed"></p>
        </div>

        <img src="jake1.png" id="jake-img" class="absolute bottom-[-100%] left-10 w-[25%] md:w-[20%] z-20 filter brightness-75 contrast-125">
        <div id="magic-glow" class="absolute bottom-0 left-0 w-full h-48 bg-gradient-to-t from-purple-900/30 to-transparent opacity-0"></div>
    </div>

    <div id="final-scene" class="fixed inset-0 flex flex-col items-center justify-center hidden z-50 bg-black">
        <div id="final-message" class="flex flex-wrap justify-center max-w-5xl px-8 gap-x-8 gap-y-4"></div>
        <div id="final-age" class="mt-16"></div>
    </div>

    <script>
        let lightningTimer; // Variable to track lightning so we can stop it

        // 1. Scene 1 Setup
        const nameElement = document.getElementById('friend-name');
        nameElement.innerHTML = nameElement.innerText.trim().split('').map(char => `<span class="letter">${char === ' ' ? '&nbsp;' : char}</span>`).join('');

        gsap.to(".letter", { opacity: 1, filter: "blur(0px)", duration: 1.5, stagger: 0.12, ease: "power2.out" });
        gsap.to("#enter-btn", { opacity: 1, y: -10, duration: 2, delay: 1.5, ease: "sine.inOut" });

        function triggerLightning() {
            const delay = Math.random() * 6000 + 2000;
            lightningTimer = setTimeout(() => {
                gsap.to("#flash", { opacity: Math.random() * 0.2 + 0.05, duration: 0.05, repeat: 1, yoyo: true, onComplete: triggerLightning });
            }, delay);
        }
        triggerLightning();

        // 2. Transition Logic
        document.getElementById('enter-btn').addEventListener('click', () => {
            document.getElementById('audio-player').contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
            gsap.to("#intro-screen", { opacity: 0, duration: 1.5, onComplete: startScene2 });
        });

        function startScene2() {
            document.getElementById('intro-screen').classList.add('hidden');
            document.getElementById('scene-2').classList.remove('hidden');

            const tl2 = gsap.timeline();
            tl2.to("#jake-img", { bottom: "0%", duration: 3, ease: "power2.out" });
            tl2.to("#bryce-img", { opacity: 0.6, duration: 5 }, "-=1.5");
            tl2.to("#bryce-speech", { opacity: 1, duration: 2, onComplete: startSpeechSequence }, "-=2.5");
            gsap.to("#bryce-img", { scale: 1.03, duration: 4, repeat: -1, yoyo: true, ease: "sine.inOut" });
        }

        // 3. Speech and 4% Lift
        function startSpeechSequence() {
            const sentences = [
                "Behold, for the veil grows thin on the anniversary of thy naming.",
                "From the black abyss of the shadow, I have summoned a power that does not sleep.",
                "I bind these words to thy soul, Jacobus, to shield thy heart and illuminate thy path.",
                "Step forth without fear, for I have wreathed thee in a fire that the darkness cannot quench."
            ];
            const textEl = document.getElementById('speech-text');
            let index = 0;

            function showNext() {
                if (index >= sentences.length) {
                    gsap.to("#bryce-img", { opacity: 0, duration: 2 });
                    gsap.to("#bryce-speech", { opacity: 0, duration: 1 });
                    gsap.to("#jake-img", { left: "50%", bottom: "25%", xPercent: -50, y: 0, scale: 1.6, duration: 3, ease: "power2.inOut", onComplete: summonMagicalFlames });
                    return;
                }
                
                textEl.innerText = sentences[index];
                gsap.to("#jake-img", { y: "-=" + (window.innerHeight * 0.04), duration: 3.5 }); 

                gsap.set(textEl, { opacity: 0, filter: "blur(20px)", y: 20, scale: 0.9, letterSpacing: "5px" });
                const stl = gsap.timeline();
                stl.to(textEl, { opacity: 1, filter: "blur(0px)", y: 0, scale: 1, letterSpacing: "0px", duration: 2.5 })
                   .to({}, { duration: 4.5 }) // UPDATED: Extra 1 second of display time
                   .to(textEl, { opacity: 0, filter: "blur(20px)", y: -80, scale: 1.3, letterSpacing: "15px", duration: 4, onComplete: () => { index++; showNext(); } });
            }
            showNext();
        }

        // 4. Power Up and Flames
        function summonMagicalFlames() {
            // SFX TRIGGER FIX
            const sfx = document.getElementById('sfx-player');
            sfx.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');

            const jake = document.getElementById('jake-img');
            const scene = document.getElementById('scene-2');
            const rect = jake.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const bottomY = rect.bottom;
            
            const fireDuration = 6000;
            const startTime = Date.now();

            function spawnFireParticle() {
                if (Date.now() - startTime > fireDuration) return;
                const p = document.createElement('div');
                p.className = 'anime-flame';
                p.style.width = (Math.random() * (rect.width * 0.5) + 30) + 'px';
                p.style.height = (Math.random() * (rect.height * 0.9) + 60) + 'px';
                p.style.left = (centerX + (Math.random() - 0.5) * rect.width * 1.3) + 'px';
                p.style.top = (bottomY - 20) + 'px';
                p.style.zIndex = Math.random() > 0.4 ? 25 : 15;
                p.style.background = 'linear-gradient(to top, #ffffff 0%, #d8b4fe 40%, #7c3aed 70%, transparent 100%)';
                scene.appendChild(p);
                gsap.to(p, { scaleX: 1.2, scaleY: 1.5, y: -(Math.random() * rect.height * 1.6 + 150), opacity: 0, duration: 0.4, onComplete: () => p.remove() });
                setTimeout(spawnFireParticle, 12);
            }
            spawnFireParticle(); spawnFireParticle();

            gsap.to("#flash", { opacity: 0.8, duration: 0.1, yoyo: true, repeat: 6 });
            gsap.to("#scene-2", { x: 4, y: 4, duration: 0.05, repeat: 30, yoyo: true });
            gsap.to(jake, { filter: "brightness(2) drop-shadow(0 0 50px #a855f7)", scale: 1.7, duration: 0.1, yoyo: true, repeat: 30 });

            setTimeout(startFinalScene, 6800);
        }

        // 5. Final Wish Reveal
        function startFinalScene() {
            // STOP LIGHTNING HAZE
            clearTimeout(lightningTimer);
            gsap.set("#flash", { opacity: 0 });

            gsap.to("#scene-2", { opacity: 0, duration: 2, onComplete: () => {
                document.getElementById('scene-2').classList.add('hidden');
                const finalScene = document.getElementById('final-scene');
                finalScene.classList.remove('hidden');
                
                const msgContainer = document.getElementById('final-message');
                const ageContainer = document.getElementById('final-age');
                
                msgContainer.innerHTML = "Happy Birthday my beautiful friend".split(' ').map(word => `<span class="fire-word text-6xl md:text-8xl opacity-0">${word}</span>`).join('');
                ageContainer.innerHTML = `<span class="fire-word text-9xl md:text-[12rem] opacity-0">29</span>`;

                gsap.to(".fire-word", {
                    color: "#ffff00", 
                    textShadow: "0 0 10px #fff, 0 -10px 20px #ffeb3b, 0 -20px 40px #ff9800",
                    duration: 0.1, repeat: -1, yoyo: true, stagger: { each: 0.1, from: "random" }
                });

                const finalTl = gsap.timeline();
                finalTl.to("#final-message .fire-word", { opacity: 1, scale: 1, filter: "blur(0px)", duration: 1.2, stagger: 0.6, ease: "back.out(1.7)", startAt: { scale: 4, filter: "blur(15px)" } });
                finalTl.to("#final-age .fire-word", { opacity: 1, scale: 1, filter: "blur(0px)", duration: 2, ease: "elastic.out(1, 0.4)", startAt: { scale: 0.1, filter: "blur(20px)" } }, "+=0.5");
            }});
        }
    </script>
</body>
</html>
